# =============================================================================
# Stage 1: Bidirectional DMD Distillation (Split Teacher / Worker Topology)
# =============================================================================
# Purpose:
# - 1 dedicated teacher node hosts only real_score
# - each worker node/group hosts generator + fake_score + text_encoder
# - worker groups synchronize gradients across replicas, while teacher serves
#   remote real_score forward passes for generator DMD loss
#
# Supported topologies with the companion launch scripts:
# - 2 nodes: 1 teacher + 1 worker group
# - 4 nodes: 1 teacher + 3 worker groups
#
# Current limitation:
# - split_teacher_worker requires dmd_latent_mode=direct_noise

# =============================================================================
# Model Paths (UPDATE THESE TO YOUR LOCAL PATHS)
# =============================================================================
checkpoint_path: /home/liujingqi/wanAR/LTX-2/ckpts/ltx-2-19b-dev.safetensors
gemma_path: /home/liujingqi/wanAR/LTX-2/ckpts/gemma3

# =============================================================================
# Model Configuration
# =============================================================================
model_name: ltx2_av

generator_grad:
  model: true
real_score_grad:
  model: false
fake_score_grad:
  model: true

# =============================================================================
# DMD Hyperparameters
# =============================================================================
denoising_step_list:
  - 1000
  - 757
  - 522
  - 0

num_train_timestep: 1000

real_video_guidance_scale: 3.0
real_audio_guidance_scale: 5.0

generator_task: bidirectional_av
real_task_type: bidirectional_av
fake_task_type: bidirectional_av

denoising_loss_type: velocity
distillation_loss: dmd
dmd_latent_mode: direct_noise

# =============================================================================
# Training Configuration
# =============================================================================
mixed_precision: true
gradient_checkpointing: true
# Split mode keeps both student and critic active on the worker side.
# Start conservatively from the known-safe smaller global batch and scale up only
# after verifying peak memory on your exact GPU SKU.
batch_size: 4

lr: 2.0e-05
generator_lr: 2.0e-05
critic_lr: 2.0e-05

beta1: 0.9
beta2: 0.999
weight_decay: 0.01
dfake_gen_update_ratio: 5
max_grad_norm: 3.0

scheduler_type: constant
# max_steps: 20000

# =============================================================================
# Data Configuration
# =============================================================================
data_path: /home/liujingqi/wanAR/OmniForcing/LTX-2/packages/ltx-distillation/configs/mtv_merged.txt
backward_simulation: true

negative_prompt: "blurry, out of focus, overexposed, underexposed, low contrast, washed out colors, excessive noise, grainy texture, poor lighting, flickering, motion blur, distorted proportions, unnatural skin tones, deformed facial features, asymmetrical face, missing facial features, extra limbs, disfigured hands, wrong hand count, artifacts around text, inconsistent perspective, camera shake, incorrect depth of field, background too sharp, background clutter, distracting reflections, harsh shadows, inconsistent lighting direction, color banding, cartoonish rendering, 3D CGI look, unrealistic materials, uncanny valley effect, incorrect ethnicity, wrong gender, exaggerated expressions, wrong gaze direction, mismatched lip sync, silent or muted audio, distorted voice, robotic voice, echo, background noise, off-sync audio, incorrect dialogue, added dialogue, repetitive speech, jittery movement, awkward pauses, incorrect timing, unnatural transitions, inconsistent framing, tilted camera, flat lighting, inconsistent tone, cinematic oversaturation, stylized filters, or AI artifacts."

# =============================================================================
# Video/Audio Configuration
# =============================================================================
num_frames: 121
video_height: 512
video_width: 768

# =============================================================================
# FSDP / Split Topology Configuration
# =============================================================================
# Worker groups now hold only student + critic.
# - when there are >= 2 worker groups, hybrid_full is used with
#   (worker_group_pg, replica_pg)
# - when there is only 1 worker group, code automatically falls back to
#   full_shard because hybrid shard has no replica dimension
# The teacher always falls back to full_shard in split mode.
sharding_strategy: hybrid_full

split_teacher_worker: true
teacher_num_nodes: 1
worker_num_nodes_per_group: 1

generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
text_encoder_fsdp_wrap_strategy: size

# =============================================================================
# Logging and Checkpointing
# =============================================================================
output_path: ./outputs/stage1_bidirectional_dmd_split_teacher_worker
log_iters: 50

wandb_project: OmniForcing
wandb_entity: lanpinggai697-peking-university
wandb_name: stage1_bidirectional_dmd_split_teacher_worker

seed: 42

# =============================================================================
# Benchmark
# =============================================================================
# Benchmark is currently disabled automatically in split_teacher_worker mode.
benchmark_enabled: false
benchmark_iters: 50
benchmark_num_prompts: 8
benchmark_seed: 12345
benchmark_video_fps: 24
benchmark_audio_sample_rate: 24000
